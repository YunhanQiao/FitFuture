name: FitFuture
options:
  bundleIdPrefix: com.fitfuture
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16.0"
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "5.10"
    DEVELOPMENT_TEAM: ""

targets:
  FitFuture:
    type: application
    platform: iOS
    sources:
      - path: FitFuture
        excludes:
          - "**/.DS_Store"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.fitfuture.app
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "1"
        INFOPLIST_FILE: FitFuture/Resources/Info.plist
        GENERATE_INFOPLIST_FILE: false
        CODE_SIGN_ENTITLEMENTS: FitFuture/Resources/FitFuture.entitlements
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        DEVELOPMENT_ASSET_PATHS: ""
        SWIFT_EMIT_LOC_STRINGS: "YES"
    entitlements:
      path: FitFuture/Resources/FitFuture.entitlements
      properties:
        com.apple.developer.applesignin:
          - Default
        aps-environment: development
